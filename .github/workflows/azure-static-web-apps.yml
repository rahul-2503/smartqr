name: SmartQR CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Run E2E Tests & Deploy Frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: smartqr-frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: smartqr-frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: smartqr-frontend
        run: npx playwright install chromium --with-deps

      - name: Run E2E Tests
        working-directory: smartqr-frontend
        run: npx playwright test

      - name: Debug Token Visibility
        run: |
          if [ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" ]; then
            echo "Error: AZURE_STATIC_WEB_APPS_API_TOKEN is empty!"
          else
            echo "Success: AZURE_STATIC_WEB_APPS_API_TOKEN is set."
          fi

      - name: Build and Deploy Static Site
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "smartqr-frontend"
          api_location: ""
          app_artifact_location: "dist"
          verbose: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Environment
    steps:
      - name: Close Job
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
